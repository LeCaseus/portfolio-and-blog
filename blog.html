<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chezter's Readings</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/blog.css" />
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon" />
  <link rel="alternate" type="application/rss+xml" title="Chezter's Readings" href="/feed.xml" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="/site_visits.js" data-website-id="0ada5184-e307-4125-b5d6-e6b37861ce7c" data-auto-track="false"
    data-performance="true"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body data-scroll-mode="split">

  <header class="masthead" role="banner">
    <span class="wordmark">chezter's <em>readings_</em></span>
    <span></span>
    <div class="masthead-right">
      <a class="back-home" href="/index.html" aria-label="Homepage"><i data-lucide="house"></i></a>
      <a class="back-home" href="/feed.xml" aria-label="RSS feed"><i data-lucide="rss"></i></a>
      <button class="theme" data-theme-toggle type="button" aria-label="Toggle theme">☾ DARK</button>
    </div>
  </header>

  <div class="read-progress" aria-hidden="true"><i id="read-progress-bar"></i></div>

  <div class="blog-grid" id="blog-grid" data-level="channels">

    <aside class="channels" aria-label="Categories">
      <div class="channels-head"><span>CHANNELS</span></div>
      <ul class="channel-list" data-channel-list></ul>
    </aside>

    <aside class="idx" aria-label="Post index">
      <button class="pane-back" data-back-to-channels type="button">‹ channels</button>
      <div class="ttl-row"><span data-channel-label>ALL ENTRIES</span><b data-visible-count>— / —</b></div>

      <div class="search">
        <div class="search-pill">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
            aria-hidden="true">
            <circle cx="11" cy="11" r="7" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" placeholder="search posts" data-search />
        </div>
      </div>

      <ul class="idx-list" data-list></ul>
    </aside>

    <article class="reader" id="reader" aria-live="polite">
      <button class="pane-back" data-back-to-posts type="button">‹ back</button>
      <div data-reader-body></div>
    </article>
  </div>

  <script type="module" src="/blog.js"></script>
  <script>
    lucide.createIcons();
  </script>

</body>

</html>
