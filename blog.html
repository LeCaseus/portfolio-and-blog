<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chezter's Readings</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/blog.css" />
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="/site_visits.js" data-website-id="0ada5184-e307-4125-b5d6-e6b37861ce7c"
    data-auto-track="false"></script>
</head>

<body>

  <header class="status" role="banner">
    <div class="left">
      <span class="dot" aria-hidden="true"></span>READING SESSION ACTIVE
    </div>
    <div class="center">CH-03 · READINGS LOG · <span data-post-count>—</span> ENTRIES</div>
    <div class="right">
      <span>UTC <span data-clock>00:00:00</span></span>
      <button class="theme" data-theme-toggle type="button" aria-label="Toggle theme">☾ DARK</button>
    </div>
  </header>

  <div class="read-progress" aria-hidden="true"><i id="read-progress-bar"></i></div>
  <div class="idx-overlay" id="idx-overlay"></div>

  <div class="blog-shell">
    <div class="blog-hd">
      <h1>Readings <em>log</em></h1>
      <div class="crumbs"><a href="/index.html">← back to subject 001</a></div>
    </div>

    <div class="blog-grid">

      <aside class="idx" aria-label="Post index">
        <div class="ttl-row"><span>INDEX</span><b data-visible-count>— / —</b></div>

        <div class="filters" role="tablist" data-filters>
          <button class="on" data-filter="all">all</button>
        </div>

        <div class="search">
          <input type="text" placeholder="search posts…" data-search />
        </div>

        <ul class="idx-list" data-list></ul>
      </aside>

      <article class="reader" id="reader" aria-live="polite">

        <button class="idx-toggle" id="idx-toggle" aria-label="Open post index">
          <span class="burger"><span></span><span></span><span></span></span>
          INDEX
        </button>
        <div class="reader-pulse" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 36" preserveAspectRatio="none" aria-hidden="true">
            <path d="" id="pulse-path" />
          </svg>
          <button class="pulse-react" data-react-btn aria-label="React to this post">
            <span class="heart">♥</span>
            <span class="count" data-react-count>-</span>
          </button>
        </div>
        <div data-reader-body></div>
      </article>
    </div>
  </div>

  <footer>
    <div>SYS:OK · fully selfhosted by me</div>
    <div class="c">// <a href="https://github.com/LeCaseus/portfolio-and-blog.git" target="_blank" rel="noopener">source
        on github</a> and <a href="/privacy.html">privacy policy</a> if you want to poke around.
    </div>
    <div>UTC <span data-clock>00:00:00</span></div>
  </footer>

  <script type="module" src="/blog.js"></script>

</body>

</html>
